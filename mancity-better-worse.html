<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City or Bust — Man City Player Rater</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #6CABDD;
    --navy: #1C2C5B;
    --gold: #F5C518;
    --white: #F8F9FF;
    --dark: #0D1321;
    --card-bg: #141E33;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    font-family: 'DM Sans', sans-serif;
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(108,171,221,0.15) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px);
  }

  header {
    text-align: center;
    padding: 2rem 1rem 0.5rem;
  }

  .badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--sky), #4a9fd4);
    color: var(--navy);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    padding: 0.25rem 0.8rem;
    border-radius: 2px;
    margin-bottom: 0.5rem;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.8rem, 8vw, 5rem);
    letter-spacing: 0.05em;
    line-height: 0.9;
    color: var(--white);
    text-shadow: 0 0 60px rgba(108,171,221,0.4);
  }

  h1 span { color: var(--sky); }

  .subtitle {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.4);
    margin-top: 0.4rem;
    font-weight: 300;
    letter-spacing: 0.05em;
  }

  .round-bar {
    text-align: center;
    padding: 1.2rem 1rem 0;
  }

  .round-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }

  .round-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--sky);
    line-height: 1;
  }

  .game-area {
    max-width: 680px;
    margin: 0 auto;
    padding: 1.4rem 1rem 3rem;
  }

  .instruction {
    text-align: center;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.05em;
    margin-bottom: 1.2rem;
  }

  .cards-wrapper {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .player-card {
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 2rem 1.6rem;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    min-height: 130px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .player-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--sky), rgba(108,171,221,0.2));
    transition: background 0.3s;
  }

  .player-card:hover {
    border-color: rgba(108,171,221,0.35);
    box-shadow: 0 0 30px rgba(108,171,221,0.12);
    transform: translateY(-2px);
  }

  .player-card.picked {
    border-color: rgba(108,171,221,0.6);
    box-shadow: 0 0 40px rgba(108,171,221,0.2);
    cursor: default;
  }

  .player-card.picked::before {
    background: linear-gradient(90deg, var(--sky), rgba(108,171,221,0.5));
  }

  .player-card.not-picked {
    opacity: 0.35;
    transform: none;
    cursor: default;
    pointer-events: none;
  }

  .player-card.picked:hover { transform: none; }

  .player-season {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .player-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    line-height: 1;
    color: var(--white);
    letter-spacing: 0.03em;
  }

  .player-pos {
    display: inline-block;
    margin-top: 0.5rem;
    font-size: 0.65rem;
    background: rgba(108,171,221,0.15);
    color: var(--sky);
    padding: 0.15rem 0.5rem;
    border-radius: 3px;
    letter-spacing: 0.1em;
  }

  .vs-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: -8px 0;
    z-index: 10;
    position: relative;
  }

  .vs-pill {
    background: var(--navy);
    border: 2px solid rgba(108,171,221,0.3);
    border-radius: 50px;
    padding: 0.4rem 1rem;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.15em;
    color: var(--sky);
  }

  .btn-next-wrap {
    display: none;
    justify-content: center;
    margin-top: 1.4rem;
    animation: fadeUp 0.3s ease;
  }

  .btn-next-wrap.show { display: flex; }

  @keyframes fadeUp {
    from { transform: translateY(8px); opacity: 0; }
    to   { transform: translateY(0);   opacity: 1; }
  }

  .btn-next {
    padding: 0.85rem 2.5rem;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--sky), #4a9fd4);
    color: var(--navy);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.12em;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-next:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(108,171,221,0.35);
  }
</style>
</head>
<body>

<header>
  <div class="badge">Manchester City</div>
  <h1>City<br><span>or</span><br>Bust</h1>
  <p class="subtitle">Who had the better season?</p>
</header>

<div class="round-bar">
  <div class="round-label">Round</div>
  <div class="round-num" id="roundDisplay">1</div>
</div>

<div class="game-area">
  <p class="instruction">Tap the player you think had the better campaign</p>

  <div class="cards-wrapper">
    <div class="player-card" id="cardA" onclick="pick('A')">
      <div class="player-season" id="seasonA"></div>
      <div class="player-name"   id="nameA"></div>
      <div class="player-pos"    id="posA"></div>
    </div>

    <div class="vs-divider"><div class="vs-pill">VS</div></div>

    <div class="player-card" id="cardB" onclick="pick('B')">
      <div class="player-season" id="seasonB"></div>
      <div class="player-name"   id="nameB"></div>
      <div class="player-pos"    id="posB"></div>
    </div>
  </div>

  <div class="btn-next-wrap" id="btnNextWrap">
    <button class="btn-next" onclick="nextRound()">Next →</button>
  </div>
</div>

<script>
const players = [
  // Original 30
  { name:"Sergio Agüero",     season:"2011/12", pos:"ST"  },
  { name:"Vincent Kompany",   season:"2011/12", pos:"CB"  },
  { name:"David Silva",       season:"2011/12", pos:"CAM" },
  { name:"Yaya Touré",        season:"2013/14", pos:"CM"  },
  { name:"Sergio Agüero",     season:"2014/15", pos:"ST"  },
  { name:"Kevin De Bruyne",   season:"2015/16", pos:"CM"  },
  { name:"Raheem Sterling",   season:"2017/18", pos:"LW"  },
  { name:"Kevin De Bruyne",   season:"2017/18", pos:"CM"  },
  { name:"Leroy Sané",        season:"2017/18", pos:"LW"  },
  { name:"Raheem Sterling",   season:"2018/19", pos:"LW"  },
  { name:"Bernardo Silva",    season:"2018/19", pos:"RM"  },
  { name:"Riyad Mahrez",      season:"2018/19", pos:"RW"  },
  { name:"Ederson",           season:"2019/20", pos:"GK"  },
  { name:"Ilkay Gündogan",    season:"2020/21", pos:"CM"  },
  { name:"Rúben Dias",        season:"2020/21", pos:"CB"  },
  { name:"Kevin De Bruyne",   season:"2021/22", pos:"CM"  },
  { name:"Phil Foden",        season:"2021/22", pos:"LW"  },
  { name:"Erling Haaland",    season:"2022/23", pos:"ST"  },
  { name:"Bernardo Silva",    season:"2022/23", pos:"RM"  },
  { name:"Rodri",             season:"2022/23", pos:"CDM" },
  { name:"Jack Grealish",     season:"2022/23", pos:"LW"  },
  { name:"Erling Haaland",    season:"2023/24", pos:"ST"  },
  { name:"Rodri",             season:"2023/24", pos:"CDM" },
  { name:"Phil Foden",        season:"2023/24", pos:"LW"  },
  { name:"Kevin De Bruyne",   season:"2023/24", pos:"CM"  },
  { name:"Sergio Agüero",     season:"2018/19", pos:"ST"  },
  { name:"David Silva",       season:"2019/20", pos:"CAM" },
  { name:"Leroy Sané",        season:"2018/19", pos:"LW"  },
  { name:"Aymeric Laporte",   season:"2018/19", pos:"CB"  },
  { name:"John Stones",       season:"2020/21", pos:"CB"  },
  // 20 new additions
  { name:"Pablo Zabaleta",    season:"2011/12", pos:"RB"  },
  { name:"Samir Nasri",       season:"2011/12", pos:"CAM" },
  { name:"Edin Džeko",        season:"2011/12", pos:"ST"  },
  { name:"Yaya Touré",        season:"2011/12", pos:"CM"  },
  { name:"Joe Hart",          season:"2011/12", pos:"GK"  },
  { name:"Aleksandar Kolarov",season:"2011/12", pos:"LB"  },
  { name:"Fernandinho",       season:"2017/18", pos:"CDM" },
  { name:"Nicolas Otamendi",  season:"2017/18", pos:"CB"  },
  { name:"Kyle Walker",       season:"2017/18", pos:"RB"  },
  { name:"Benjamin Mendy",    season:"2017/18", pos:"LB"  },
  { name:"Gabriel Jesus",     season:"2018/19", pos:"ST"  },
  { name:"Fernandinho",       season:"2018/19", pos:"CDM" },
  { name:"Oleksandr Zinchenko",season:"2021/22",pos:"LB"  },
  { name:"John Stones",       season:"2021/22", pos:"CB"  },
  { name:"Gabriel Jesus",     season:"2021/22", pos:"ST"  },
  { name:"Phil Foden",        season:"2020/21", pos:"LW"  },
  { name:"Riyad Mahrez",      season:"2021/22", pos:"RW"  },
  { name:"Manuel Akanji",     season:"2022/23", pos:"CB"  },
  { name:"Matheus Nunes",     season:"2023/24", pos:"CM"  },
  { name:"Jeremy Doku",       season:"2023/24", pos:"LW"  },
];

let round = 1;
let queue = [];
let survivorIdx, challengerIdx;
let picked = false;

function shuffle(arr) {
  let a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderCard(prefix, p) {
  document.getElementById('season' + prefix).textContent = p.season;
  document.getElementById('name'   + prefix).textContent = p.name;
  document.getElementById('pos'    + prefix).textContent = p.pos;
}

function resetState() {
  picked = false;
  document.getElementById('cardA').className = 'player-card';
  document.getElementById('cardB').className = 'player-card';
  document.getElementById('btnNextWrap').classList.remove('show');
}

function initGame() {
  queue = shuffle(players);
  survivorIdx   = 0;
  challengerIdx = 1;
  round = 1;
  resetState();
  renderCard('A', queue[survivorIdx]);
  renderCard('B', queue[challengerIdx]);
  document.getElementById('roundDisplay').textContent = round;
}

function pick(choice) {
  if (picked) return;
  picked = true;

  document.getElementById('card' + choice).classList.add('picked');
  document.getElementById('card' + (choice === 'A' ? 'B' : 'A')).classList.add('not-picked');

  survivorIdx = choice === 'A' ? survivorIdx : challengerIdx;
  document.getElementById('btnNextWrap').classList.add('show');
}

function nextRound() {
  round++;
  challengerIdx++;

  // If we've run out of challengers, reshuffle the pool
  // but keep the current survivor in play
  if (challengerIdx >= queue.length) {
    const survivor = queue[survivorIdx];
    queue = shuffle(players.filter(p => !(p.name === survivor.name && p.season === survivor.season)));
    queue.unshift(survivor); // survivor stays at index 0
    survivorIdx   = 0;
    challengerIdx = 1;
  }

  resetState();
  renderCard('A', queue[survivorIdx]);
  renderCard('B', queue[challengerIdx]);
  document.getElementById('roundDisplay').textContent = round;
}

initGame();
</script>
</body>
</html>
